enabled_crawlers:
  - linkedin

linkedin:
  filters:
    keywords: "Software Engineer"
    location: "Ho Chi Minh City, Vietnam"
    experience_level: ["junior", "mid"]
    job_type: ["full-time"]
    work_type: ["remote"]
    date_posted: "past_24h"
  max_jobs_per_run: 10
  max_pages: 3

rate_limiting:
  min_delay: 2
  max_delay: 5

output:
  generate_resume: true
  generate_cover_letter: true
  style: "Default"
